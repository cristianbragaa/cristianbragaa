name: Generate Material Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate snake (Material You)
        uses: Platane/snk@v3
        with:
          github_user_name: cristianbragaa
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#6750A4&color_dots=#F6F2FF,#EADDFF,#D0BCFF,#6750A4

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
